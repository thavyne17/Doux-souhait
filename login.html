<style>
    * {
    font-family: "Poppins", sans-serif;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: url(bicho-de-pe-delicioso-receita-completa.jpg);
    width: 100%;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-size: cover;
    background-position: center;
}

.logo {
    position: absolute; /* Posiciona a logo de forma absoluta */
    top: -10px; /* Ajuste o valor conforme necessário */
    right: 50px; /* Ajuste o valor conforme necessário */
    width: 10%; /* Ajuste o tamanho conforme necessário */
}
.container {
    background: rgb(rgba(253, 136, 136, 0.815), green, rgb(54, 54, 158));
    width: 320px;
    padding: 24px;
    border-radius: 16px;
    border: solid 5px rgb(red, rgb(236, 141, 213), rgb(218, 108, 108));
    backdrop-filter: blur(25px);
    box-shadow: 0px 0px 30px 20px rgb(red, green, blue);
    color: rgb(133, 42, 42);
    display: flex;
    flex-direction: column;
    align-items: center;
}

.login-title {
    margin-bottom: 16px;
    color: #ec6f86;
}

.input-box {
    display: flex;
    width: 100%;
    position: relative;
    margin-top: 20px;
}

.input-box input {
    width: 100%;
    padding: 10px 16px 10px 38px;
    border-radius: 99px;
    border: solid 3px transparent;
    background: rgb(red, green, blue);
    outline: none;
    caret-color: white;
    color: #870929;
    font-weight: 500;
    transition: 0.25s;
}
.input-box input:focus {
    border: solid 3px rgb(red, green, blue);
}
.input-box input::placeholder {
    color: rgb(red, green, blue);
}
.input-box input::-ms-reveal {
    filter: invert(100%);
}
.input-box i {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    left: 14px;
    color: rgb(red, green, blue);
    font-size: 18px;
    transition: 0.25s;
}
.input-box input:focus + i {
    color: white;
}

.remember-forgot-box {
    display: flex;
    width: 100%;
    margin-top: 16px;
    justify-content: space-between;
}

.remember-forgot-box h5 {
    font-weight: normal;
}

.remember-me {
    display: flex;
    gap: 8px;
}
.forgot-password:hover {
    text-decoration: underline;
}

.login-button {
    display: inline-block; /* Permite dimensões e margens */
    padding: 10px 0px;  /* Espaçamento interno */
    color: white;         /* Cor do texto */
    background-color: #745050; /* Cor de fundo */
    text-align: center;   /* Centraliza o texto */
    border: none;         /* Remove borda */
    border-radius: 99px;  /* Bordas arredondadas */
    text-decoration: none; /* Remove sublinhado */
    width: 100%;
    margin-top: 24px;
    background: #745050;
    font-size: 15px;
    cursor: pointer;
    outline: transparent 3px solid;
    transition: 0.1s;
}
.login-button:focus {
    outline: #ec6f86 3px solid;
    background-color: darkblue; /* Efeito de hover */
}

.dont-have-an-account {
    font-weight: normal;
    margin-top: 12px;
}
</style>
